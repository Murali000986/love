<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Love Meter 💖</title>
  <link rel="stylesheet" href="/src/css/style.css">
</head>
<body>
  <div id="particles-js"></div>
  
  <div class="theme-toggle">
    <button id="theme-btn">🌙</button>
  </div>

  <div class="container">
    <div class="glass-card main-card">
      <h1 class="title">Love Meter</h1>
      <p class="subtitle">Check your compatibility!</p>
      
      <form id="love-form">
        <div class="input-group">
          <input type="text" id="boy-name" placeholder="Boy's Name" required autocomplete="off">
          <span class="icon">👦</span>
        </div>
        <div class="heart-divider">💖</div>
        <div class="input-group">
          <input type="text" id="girl-name" placeholder="Girl's Name" required autocomplete="off">
          <span class="icon">👧</span>
        </div>
        <button type="submit" class="btn-check" id="check-btn">Check Love</button>
      </form>

      <div class="loading-state hidden" id="loading">
        <div class="hourglass-loader"></div>
        <p>Calculating Love...</p>
      </div>

      <div class="result-state hidden" id="result">
        <div class="hourglass-wrapper">
          <svg width="250" height="350" viewBox="0 0 200 300" class="hourglass-svg" id="result-hourglass">
            <defs>
              <clipPath id="glass-clip">
                <path d="M 40,30 C 40,100 85,120 85,150 C 85,180 40,200 40,270 L 160,270 C 160,200 115,180 115,150 C 115,120 160,100 160,30 Z" />
              </clipPath>
              <linearGradient id="sand-grad-3d" x1="0" y1="0" x2="1" y2="0">
                <stop offset="0%" stop-color="#cc0044" />
                <stop offset="30%" stop-color="#ff3377" />
                <stop offset="70%" stop-color="#ff3377" />
                <stop offset="100%" stop-color="#990033" />
              </linearGradient>
              <linearGradient id="glass-highlight" x1="0" y1="0" x2="1" y2="0">
                <stop offset="0%" stop-color="rgba(255,255,255,0.6)" />
                <stop offset="50%" stop-color="rgba(255,255,255,0.0)" />
                <stop offset="100%" stop-color="rgba(255,255,255,0.2)" />
              </linearGradient>
            </defs>

            <!-- Top Base -->
            <ellipse cx="100" cy="30" rx="80" ry="12" fill="#2a1d12" />
            <path d="M 20,20 L 20,30 A 80,12 0 0,0 180,30 L 180,20 A 80,12 0 0,1 20,20 Z" fill="#523a23" />
            <ellipse cx="100" cy="20" rx="80" ry="12" fill="#7a5533" />

            <!-- Sand and Stream Container -->
            <g clip-path="url(#glass-clip)">
               <!-- Top sand -->
               <rect id="hourglass-top-fill" x="0" y="30" width="200" height="120" fill="url(#sand-grad-3d)" />
               <!-- Falling stream -->
               <rect id="hourglass-stream" x="97" y="150" width="6" height="0" fill="url(#sand-grad-3d)" />
               <!-- Bottom sand -->
               <rect id="hourglass-fill" x="0" y="270" width="200" height="0" fill="url(#sand-grad-3d)" />
            </g>

            <!-- Hanging Dolls inside top bulb -->
            <g class="doll-left">
              <line x1="80" y1="30" x2="70" y2="80" stroke="#fff" stroke-width="1.5" stroke-dasharray="2,2"/>
              <text x="70" y="105" font-size="30" text-anchor="middle" filter="drop-shadow(0 2px 2px rgba(0,0,0,0.5))">👦</text>
            </g>
            <g class="doll-right">
              <line x1="120" y1="30" x2="130" y2="70" stroke="#fff" stroke-width="1.5" stroke-dasharray="2,2"/>
              <text x="130" y="95" font-size="30" text-anchor="middle" filter="drop-shadow(0 2px 2px rgba(0,0,0,0.5))">👧</text>
            </g>

            <!-- Glass Body Overlay -->
            <path d="M 40,30 C 40,100 85,120 85,150 C 85,180 40,200 40,270 L 160,270 C 160,200 115,180 115,150 C 115,120 160,100 160,30 Z" fill="url(#glass-highlight)" stroke="rgba(255,255,255,0.6)" stroke-width="3" stroke-linejoin="round"/>
            
            <!-- Specular Reflection -->
            <path d="M 45,40 C 45,100 88,125 88,150 C 88,175 45,200 45,260" fill="none" stroke="rgba(255,255,255,0.8)" stroke-width="4" filter="drop-shadow(0 0 2px white)"/>

            <!-- Bottom Base -->
            <ellipse cx="100" cy="280" rx="80" ry="12" fill="#2a1d12" />
            <path d="M 20,270 L 20,280 A 80,12 0 0,0 180,280 L 180,270 A 80,12 0 0,1 20,270 Z" fill="#523a23" />
            <ellipse cx="100" cy="270" rx="80" ry="12" fill="#7a5533" />
          </svg>
          <span id="score-text">0%</span>
        </div>
        <h3 id="names-text">John & Jane</h3>
        <p id="message-text" class="message">Message here</p>
        <button class="btn-reset" id="reset-btn">Check Another</button>
      </div>
    </div>
  </div>

  <script type="module" src="/src/js/particles.js"></script>
  <script type="module" src="/src/js/main.js"></script>
</body>
</html>
